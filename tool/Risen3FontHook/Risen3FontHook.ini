[Risen3FontHookTest]
; This project was created using AI. 
; Runtime config. Put this file next to d3d9.dll.
; Prepare font.dds and font.json offline with msdf-atlas-gen, then keep both
; next to d3d9.dll unless you use absolute paths below.

; External atlas pixels. DDS and BMP are supported.
enableExternalAtlas=1
externalAtlasFile=font.dds

; MSDF/SDF glyph metadata. JSON supplies atlas rects, plane bounds, and advance.
enableMsdfAtlas=1
msdfAtlasJson=font.json

; Must match the -size value used when generating font.json/font.dds.
msdfPixelSize=42

; Normal spacing knobs for end users.
msdfAdvanceScale=1.0
msdfAdvanceExtra=0
msdfMetricOffsetY=-40

; Optional UTF-16LE glyph map. Test.
; Format per line: codepoint fallback x1 y1 x2 y2 advanceExtra
; Example line: 4E2D 0056 0 0 56 56 30
glyphMap=

; Runtime replacement mode used by the current MSDF atlas path.
enableBuildUvHook=1
enableBuildUvRectOverride=1
enableAtlasGetterHook=0
enableTextureReplaceHook=1
enableShadowResource=0
enableFullFontAtlasReplace=1

; Usually leave this at 250. Increase only if glyphs briefly render from the
; original texture before the replacement atlas is bound.
textureReplaceWindowMs=200
