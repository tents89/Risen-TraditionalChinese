[Risen3FontHookTest]
; Developer config. Copy this over Risen3FontHookTest.ini when diagnosing hooks.
; This file intentionally includes every INI key currently read by dllmain_patch-2.cpp.
; The old in-process atlas generation path is no longer supported.

; Resource replacement experiments.
replacementIndex=
replacement=
enableReplacement=0

; Low-level hooks.
enableCommandWriteHook=0
enableSubmitHook=0
enableBuildUvHook=1
enableBuildUvRectOverride=1
enableAtlasGetterHook=0
enableTextureReplaceHook=1
enableShadowResource=0
enableFullFontAtlasReplace=1
enableFlushHook=0

; Manual glyph override path.
buildUvRect=0,0,56,56
glyphCodepoint=4E2D
glyphFallback=0056
glyphRect=0,0,56,56
glyphAdvanceExtra=30
glyphMap=

; External atlas pixels. DDS and BMP are supported.
enableExternalAtlas=1
externalAtlasFile=font.dds
externalAtlasBmp=

; MSDF/SDF metadata and metrics.
enableMsdfAtlas=1
msdfAtlasJson=font.json
msdfPixelSize=42
msdfAdvanceScale=1.0
msdfAdvanceExtra=0
msdfMetricOffsetY=-40

; Backward-compatible metric aliases for older configs.
; These only feed the MSDF metric knobs above; they do not enable atlas generation.
freeTypePixelSize=
freeTypeAdvanceExtra=

; Diagnostics.
enableDrawGlyphDiagnostics=0

; Atlas/resource selection. atlasResourceIndex=-2 auto-picks another observed atlas.
atlasResourceIndex=0
atlasResource=

; Legacy texture-probe path.
targetD3DTexture=
replaceProbeTextures=0
textureReplaceWindowMs=250
